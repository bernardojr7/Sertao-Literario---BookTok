<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sertão Literário</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Firebase Compat Libraries -->
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-storage-compat.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --text: #172033;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #f59e0b;
      --primary-dark: #d97706;
      --green: #22c55e;
      --green-dark: #15803d;
      --cyan: #06b6d4;
      --pink: #ec4899;
      --danger: #ef4444;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    body.dark {
      --bg: #0f172a;
      --surface: #172033;
      --surface2: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #334155;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 0%, rgba(245, 158, 11, 0.10), transparent 25%), var(--bg);
      color: var(--text);
      transition: background .25s, color .25s;
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    .hidden { display: none !important; }

    /* Toast Notifications */
    .toast {
      position: fixed; right: 22px; top: 22px; z-index: 50;
      max-width: 380px; padding: 16px 20px; border-radius: 14px;
      color: white; background: #172033; box-shadow: var(--shadow);
      transform: translateY(-12px); opacity: 0; transition: .25s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--green-dark); }
    .toast.error { background: #b91c1c; }

    /* Auth Page */
    .auth-layout { min-height: 100vh; display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(380px, 0.9fr); }
    .auth-hero {
      position: relative; overflow: hidden; padding: 70px clamp(30px, 7vw, 110px);
      color: white;
      background: linear-gradient(135deg, rgba(15,23,42,0.88), rgba(21,128,61,0.70)),
                  url('https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=1600&q=85') center/cover;
    }
    .auth-hero::after {
      content: '🌵'; position: absolute; right: 7%; bottom: -30px;
      font-size: 180px; opacity: 0.20; transform: rotate(-8deg);
    }
    .auth-hero-content { position: relative; z-index: 1; max-width: 620px; margin-top: 18vh; }
    .auth-hero-content h1 { font-family: 'Baloo 2', cursive; font-size: clamp(50px, 6vw, 80px); line-height: 0.95; margin: 20px 0; }
    .auth-hero-content p { max-width: 560px; color: rgba(255,255,255,0.85); font-size: 18px; line-height: 1.7; }

    .auth-panel { display: grid; place-items: center; padding: 30px; background: var(--surface); }
    .auth-card { width: min(100%, 470px); padding: 40px; border: 1px solid var(--border); border-radius: 28px; background: var(--surface); box-shadow: var(--shadow); }
    .auth-card h2 { font-family: 'Baloo 2', cursive; font-size: 32px; margin-bottom: 8px; }
    .auth-card > p { color: var(--muted); margin-bottom: 28px; }

    .auth-tabs {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 5px; margin-bottom: 24px;
      border-radius: 14px; background: var(--surface2);
    }
    .auth-tabs button { padding: 12px; border-radius: 10px; color: var(--muted); background: transparent; font-weight: 600; }
    .auth-tabs button.active { color: var(--text); background: var(--surface); box-shadow: 0 4px 14px rgba(15,23,42,0.08); }

    /* Form Components */
    .form-grid { display: grid; gap: 16px; }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 13px; font-weight: 600; }
    input, select, textarea {
      width: 100%; padding: 14px 15px; border: 1px solid var(--border); border-radius: 13px;
      outline: none; color: var(--text); background: var(--surface2); transition: border .2s;
    }
    textarea { min-height: 110px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(245,158,11,0.14); }

    .checkbox-group {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; padding: 10px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 13px;
    }
    .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); cursor: pointer; }
    .checkbox-item input { width: auto; }

    .primary-btn, .secondary-btn, .danger-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 46px; padding: 12px 18px; border-radius: 13px; font-weight: 700; transition: .2s;
    }
    .primary-btn { color: white; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
    .secondary-btn { color: var(--text); border: 1px solid var(--border); background: var(--surface); }
    .danger-btn { color: white; background: var(--danger); }
    .primary-btn:hover, .secondary-btn:hover, .danger-btn:hover { transform: translateY(-2px); }
    .full { width: 100%; }

    /* Main App Layout */
    .app-shell { min-height: 100vh; padding-bottom: 92px; }
    .topbar {
      position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between;
      gap: 18px; padding: 18px clamp(18px, 5vw, 70px);
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 86%, transparent); backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 10px; font-family: 'Baloo 2', cursive; font-size: 24px; font-weight: 800; }
    .brand-mark { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 14px; background: linear-gradient(135deg, var(--primary), var(--green)); font-size: 24px; overflow: hidden; }
    .brand-mark img { width: 100%; height: 100%; object-fit: cover; }
    
    .top-actions { display: flex; align-items: center; gap: 10px; }
    .icon-btn { width: 42px; height: 42px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: 12px; color: var(--text); background: var(--surface); }
    .user-pill { display: flex; align-items: center; gap: 10px; padding: 5px 14px 5px 5px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); }
    
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      color: white; font-weight: 800; font-size: 14px;
      display: grid; place-items: center; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .page { width: min(1400px, 100%); margin: 0 auto; padding: 34px clamp(18px, 5vw, 70px); }
    .page-title { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 28px; }
    .page-title h1 { font-family: 'Baloo 2', cursive; font-size: clamp(36px, 5vw, 52px); line-height: 1; }
    .page-title p { margin-top: 7px; color: var(--muted); }

    /* Dashboard Widgets */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .stat-card {
      position: relative; overflow: hidden; padding: 22px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow);
    }
    .stat-card::after { content: ''; position: absolute; right: -20px; bottom: -30px; width: 100px; height: 100px; border-radius: 50%; background: rgba(245,158,11,0.10); }
    .stat-label { color: var(--muted); font-size: 13px; font-weight: 600; }
    .stat-value { font-family: 'Baloo 2', cursive; font-size: 34px; line-height: 1; margin-top: 7px; }
    .stat-icon { margin-bottom: 8px; font-size: 26px; }

    .panel { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); padding: 24px; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
    .panel-header h2 { font-family: 'Baloo 2', cursive; font-size: 24px; }
    .content-grid { display: grid; grid-template-columns: 1.35fr 0.65fr; gap: 18px; margin-top: 18px; }

    .progress-list { display: grid; gap: 18px; }
    .progress-info { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 13px; }
    .progress { height: 10px; border-radius: 99px; background: var(--surface2); overflow: hidden; }
    .progress > div { height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--primary), var(--green)); }

    .ranking { display: grid; gap: 10px; }
    .ranking-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 14px; background: var(--surface2); }
    .ranking-pos { width: 26px; color: var(--primary-dark); font-weight: 800; text-align: center; }
    .ranking-name { flex: 1; font-weight: 600; }
    .xp-badge { padding: 5px 9px; border-radius: 8px; color: var(--green-dark); background: rgba(34,197,94,0.13); font-size: 12px; font-weight: 700; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 18px; }
    .book-card, .post-card, .campaign-card { overflow: hidden; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); }
    .book-cover { height: 170px; display: grid; place-items: center; background: linear-gradient(135deg, #f59e0b, #15803d); color: white; font-family: 'Baloo 2', cursive; font-size: 24px; }
    .book-content, .post-content, .campaign-content { padding: 18px; }
    .book-content h3, .campaign-content h3 { margin-bottom: 5px; }
    .book-content p, .campaign-content p { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .book-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }

    .tag { display: inline-flex; padding: 6px 10px; border-radius: 999px; color: var(--green-dark); background: rgba(34,197,94,0.13); font-size: 11px; font-weight: 700; margin-bottom: 6px; }

    .post-video { height: 220px; display: grid; place-items: center; background: linear-gradient(135deg, #06b6d4, #ec4899); color: white; font-size: 48px; }
    .post-actions { display: flex; gap: 12px; margin-top: 14px; }
    .post-actions button { padding: 6px 10px; border-radius: 99px; color: var(--muted); background: var(--surface2); }

    .empty-state { padding: 50px 20px; color: var(--muted); text-align: center; }

    /* Modal */
    .modal {
      position: fixed; inset: 0; z-index: 40; display: grid; place-items: center; padding: 20px;
      background: rgba(15,23,42,0.55); backdrop-filter: blur(5px);
    }
    .modal-card { width: min(100%, 560px); max-height: calc(100vh - 40px); overflow-y: auto; padding: 28px; border: 1px solid var(--border); border-radius: 24px; background: var(--surface); box-shadow: var(--shadow); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-header h2 { font-family: 'Baloo 2', cursive; font-size: 28px; }

    /* Bottom Navigation Bar */
    .bottom-nav {
      position: fixed; left: 50%; bottom: 16px; z-index: 20;
      width: min(720px, calc(100% - 28px));
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 7px;
      border: 1px solid var(--border); border-radius: 22px;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow); backdrop-filter: blur(16px);
      transform: translateX(-50%);
    }
    .nav-btn { display: grid; justify-items: center; gap: 3px; padding: 9px 4px; border-radius: 14px; color: var(--muted); background: transparent; font-size: 11px; font-weight: 600; }
    .nav-btn span:first-child { font-size: 20px; }
    .nav-btn.active { color: var(--primary-dark); background: rgba(245,158,11,0.12); }

    .section-space { margin-top: 28px; }
    .muted { color: var(--muted); }
    .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }

    @media (max-width: 1050px) {
      .auth-layout { grid-template-columns: 1fr; }
      .auth-hero { min-height: 350px; }
      .auth-hero-content { margin-top: 40px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .content-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .auth-hero { min-height: 300px; padding: 32px 22px; }
      .auth-hero-content h1 { font-size: 42px; }
      .auth-panel { padding: 18px; }
      .auth-card { padding: 24px; }
      .topbar { padding: 14px 18px; }
      .page { padding: 25px 16px 100px; }
      .page-title { flex-direction: column; align-items: flex-start; }
      .stats-grid, .cards-grid { grid-template-columns: 1fr; }
      .bottom-nav { bottom: 10px; }
    }
  </style>
</head>
<body>

  <div id="app"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modalTitle">Título</h2>
        <button id="closeModalBtn" class="icon-btn">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyA-xVOI6qXkEndKXkSp6-zRLY01qNkQH4E",
      authDomain: "sertao-literario-booktok.firebaseapp.com",
      projectId: "sertao-literario-booktok",
      storageBucket: "sertao-literario-booktok.firebasestorage.app",
      messagingSenderId: "291651799720",
      appId: "1:291651799720:web:b5c79954511f09b8ddd09d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    const PROFESSOR_CODE = "SERTAO-PROF-2026";
    const COORDINATOR_CODE = "SERTAO-COORD-2026";
    const TURMAS_DISPONIVEIS = ["5º Ano", "6º Ano", "7º Ano", "8º Ano", "9º Ano"];

    let currentUser = null;
    let currentProfile = null;
    let currentPage = "home";
    let currentTheme = localStorage.getItem("st-theme") || "light";

    document.body.classList.toggle("dark", currentTheme === "dark");

    // --- HELPER FUNCTIONS ---
    function $(s) { return document.querySelector(s); }
    function $$(s) { return document.querySelectorAll(s); }

    function toast(msg, type = "") {
      const t = $("#toast");
      t.textContent = msg;
      t.className = "toast show " + type;
      setTimeout(() => { t.className = "toast"; }, 3500);
    }

    function initials(name) {
      return (name || "SL").split(" ").slice(0, 2).map(w => w[0]).join("").toUpperCase();
    }

    function roleLabel(r) {
      const map = { student: "Aluno", teacher: "Professor", coordinator: "Coordenador" };
      return map[r] || "Usuário";
    }

    function openModal(title, body) {
      $("#modalTitle").textContent = title;
      $("#modalBody").innerHTML = body;
      $("#modal").classList.remove("hidden");
    }

    function closeModal() {
      $("#modal").classList.add("hidden");
    }

    function pageTitle(title, desc, extra = "") {
      return `<div class="page-title"><div><h1>${title}</h1><p>${desc}</p></div>${extra}</div>`;
    }

    function statCard(icon, label, value) {
      return `<div class="stat-card"><div class="stat-icon">${icon}</div><div class="stat-label">${label}</div><div class="stat-value">${value}</div></div>`;
    }

    function renderAvatar(photoURL, name) {
      if (photoURL) {
        return `<div class="avatar"><img src="${photoURL}" alt="Perfil" /></div>`;
      }
      return `<div class="avatar">${initials(name)}</div>`;
    }

    // --- SEED INITIAL DATA (BILIOTECA, MISSÕES E CAMPANHAS) ---
    async function seedInitialData() {
      try {
        // Seed Books
        const booksSnap = await db.collection("books").get();
        if (booksSnap.empty) {
          const initialBooks = [
            { title: "O Auto da Compadecida", author: "Ariano Suassuna", pages: 208, category: "Teatro / Sertão", pdfUrl: "", isActive: true, createdAt: new Date().toISOString() },
            { title: "Vidas Secas", author: "Graciliano Ramos", pages: 176, category: "Literatura Sertaneja", pdfUrl: "", isActive: true, createdAt: new Date().toISOString() },
            { title: "O Pequeno Príncipe", author: "Antoine de Saint-Exupéry", pages: 96, category: "Infanto-Juvenil", pdfUrl: "", isActive: true, createdAt: new Date().toISOString() },
            { title: "Dom Casmurro", author: "Machado de Assis", pages: 256, category: "Clássico", pdfUrl: "", isActive: true, createdAt: new Date().toISOString() },
            { title: "Morte e Vida Severina", author: "João Cabral de Melo Neto", pages: 112, category: "Poesia / Sertão", pdfUrl: "", isActive: true, createdAt: new Date().toISOString() }
          ];
          for (const b of initialBooks) { await db.collection("books").add(b); }
        }

        // Seed Missions
        const missionsSnap = await db.collection("missions").get();
        if (missionsSnap.empty) {
          const initialMissions = [
            { title: "🌵 Resenha Sertaneja", description: "Grave uma resenha em vídeo de 1 minuto no BookTok sobre um livro regional.", coins: 100, isActive: true, createdAt: new Date().toISOString() },
            { title: "📖 Maratona de Leitura", description: "Leia e registre 50 páginas de qualquer livro da biblioteca neste final de semana.", coins: 80, isActive: true, createdAt: new Date().toISOString() },
            { title: "💬 Clube da Leitura", description: "Comente em 3 vídeos de colegas de turma no BookTok.", coins: 50, isActive: true, createdAt: new Date().toISOString() }
          ];
          for (const m of initialMissions) { await db.collection("missions").add(m); }
        }

        // Seed Campaigns
        const campaignsSnap = await db.collection("campaigns").get();
        if (campaignsSnap.empty) {
          const initialCampaigns = [
            { title: "Festival Literário do Sertão 2026", description: "Leia 3 livros até o final do mês e ganhe a insígnia exclusiva do Sertão e 300 Cactoscoins!", banner: "🏜️", isActive: true, createdAt: new Date().toISOString() },
            { title: "Campanha Cordel & Poesia", description: "Escreva ou declame um poema/cordel no BookTok e concorra a brindes na loja.", banner: "📜", isActive: true, createdAt: new Date().toISOString() }
          ];
          for (const c of initialCampaigns) { await db.collection("campaigns").add(c); }
        }
      } catch (e) {
        console.error("Erro ao semear dados iniciais:", e);
      }
    }

    // --- APP RENDERER ---
    function renderApp() {
      const p = currentProfile;
      const icons = ["🏠","📚","🛍️","🎬","👤"];
      const labels = ["Home","Biblioteca","Loja","BookTok","Perfil"];
      const pages = ["home","library","store","booktok","profile"];

      let navHtml = pages.map((page, i) => 
        `<button class="nav-btn${page === currentPage ? ' active' : ''}" data-page="${page}">
          <span>${icons[i]}</span><span>${labels[i]}</span>
        </button>`
      ).join("");

      $("#app").innerHTML = `
        <div class="app-shell">
          <header class="topbar">
            <div class="brand">
              <div class="brand-mark">${p.photoURL ? `<img src="${p.photoURL}"/>` : '🌵'}</div>
              <span>Sertão Literário</span>
            </div>
            <div class="top-actions">
              <button id="themeBtn" class="icon-btn">${currentTheme === "dark" ? "☀" : "☾"}</button>
              <div class="user-pill">
                ${renderAvatar(p.photoURL, p.name)}
                <span>${(p.name || "").split(" ")[0]}</span>
              </div>
              <button id="logoutBtn" class="secondary-btn">Sair</button>
            </div>
          </header>
          <main id="pageContent" class="page"></main>
          <nav class="bottom-nav">${navHtml}</nav>
        </div>`;

      $("#themeBtn").onclick = () => {
        currentTheme = currentTheme === "dark" ? "light" : "dark";
        document.body.classList.toggle("dark", currentTheme === "dark");
        localStorage.setItem("st-theme", currentTheme);
        renderApp();
      };

      $("#logoutBtn").onclick = () => auth.signOut();

      $$(".nav-btn").forEach(btn => {
        btn.onclick = function() {
          currentPage = this.dataset.page;
          renderApp();
        };
      });

      loadPage();
    }

    function loadPage() {
      const pages = {
        home: renderHome,
        library: renderLibrary,
        store: renderStore,
        booktok: renderBookTok,
        profile: renderProfile
      };
      pages[currentPage]();
    }

    // --- HOME PAGE ---
    async function renderHome() {
      const p = currentProfile;
      const isStu = p.role === "student";

      let rankingHtml = '<div class="empty-state">Aguardando dados</div>';

      if (isStu) {
        try {
          const q = db.collection("users")
            .where("className", "==", p.className)
            .where("role", "==", "student")
            .orderBy("xp", "desc")
            .limit(5);
          const snap = await q.get();
          if (!snap.empty) {
            const users = [];
            snap.forEach(d => users.push({ id: d.id, ...d.data() }));
            rankingHtml = users.map((u, i) => `
              <div class="ranking-item">
                <div class="ranking-pos">${i+1}</div>
                ${renderAvatar(u.photoURL, u.name)}
                <div class="ranking-name">${u.name}</div>
                <span class="xp-badge">${u.xp || 0} XP</span>
              </div>
            `).join("");
          }
        } catch(e) { console.error(e); }
      }

      const booksRead = p.booksRead || 0;
      const xp = p.xp || 0;
      const coins = p.cactoscoins || 0;
      const level = p.level || 1;
      const turmasText = Array.isArray(p.classes) ? p.classes.join(", ") : (p.className || "Geral");

      $("#pageContent").innerHTML =

    async function loadCampaigns() {
      try {
        const snap = await db.collection("campaigns").where("isActive","==",true).get();
        const el = $("#campaignsContainer");
        if (snap.empty) { el.innerHTML = '<div class="empty-state">Nenhuma campanha ativa no momento.</div>'; return; }
        let html = "";
        snap.forEach(d => {
          const c = d.data();
          html += `
            <article class="campaign-card">
              <div class="book-cover">${c.banner || '🌵'}</div>
              <div class="campaign-content">
                <span class="tag">Campanha em Destaque</span>
                <h3>${c.title}</h3>
                <p>${c.description}</p>
              </div>
            </article>`;
        });
        el.innerHTML = html;
      } catch(e) { console.error(e); }
    }

    async function loadMissions() {
      try {
        const snap = await db.collection("missions").where("isActive","==",true).orderBy("createdAt","desc").limit(20).get();
        const el = $("#missionsContainer");
        if (snap.empty) { el.innerHTML = '<div class="empty-state">Nenhuma missão ativa.</div>'; return; }
        let html = "";
        snap.forEach(d => {
          const m = d.data();
          html += `
            <div class="panel" style="padding:18px;margin-bottom:10px">
              <div class="flex-between">
                <strong>${m.title}</strong>
                <span class="reward" style="color:var(--primary-dark);font-weight:800">+${m.coins || 0} 🌵</span>
              </div>
              <p class="muted" style="margin-top:6px">${m.description || ""}</p>
              ${currentProfile.role === "student" ? `<button class="primary-btn" style="margin-top:10px;padding:8px 12px;min-height:auto;font-size:13px" data-mission="${d.id}">Concluir Missão</button>` : ''}
            </div>`;
        });
        el.innerHTML = html;
        $$("[data-mission]").forEach(btn => {
          btn.onclick = () => toast("Missão enviada para validação!", "success");

      } catch(e) { console.error(e); }

    // --- AUTHENTICATION MODULE ---
    let isRegister = false;

    function renderAuth() {
      if (localStorage.getItem("st-theme") === "dark") document.body.classList.add("dark");

      const turmasOptions = TURMAS_DISPONIVEIS.map(t => `<option value="${t}">${t}</option>`).join("");
      const turmasCheckboxes = TURMAS_DISPONIVEIS.map(t => `
        <label class="checkbox-item">
          <input type="checkbox" name="teacherClasses" value="${t}" /> ${t}
        </label>
      `).join("");

      document.getElementById("app").innerHTML = `
        <div class="auth-layout">
          <div class="auth-hero">
            <div class="brand"><div class="brand-mark">🌵</div><span>Sertão Literário</span></div>
            <div class="auth-hero-content">
              <h1>A leitura virou jornada.</h1>
              <p>Uma experiência literária gamificada do 5º ao 9º ano. Leia, conquiste e compartilhe resenhas!</p>
            </div>
          </div>
          <div class="auth-panel">
            <div class="auth-card">
              <h2 id="authTitle">Entrar na jornada</h2>
              <p id="authDesc">Acesse seu painel literário.</p>
              <div class="auth-tabs">
                <button id="tabLogin" class="active">Entrar</button>
                <button id="tabReg">Criar conta</button>
              </div>
              <form id="authForm" class="form-grid">
                <div id="nameField" class="hidden"><label>Nome Completo <input id="inpName" type="text" /></label></div>
                <label>E-mail <input id="inpEmail" type="email" required /></label>
                
                <div id="roleField" class="hidden">
                  <label>Perfil <select id="inpRole">
                    <option value="student">Aluno</option>
                    <option value="teacher">Professor</option>
                    <option value="coordinator">Coordenador</option>
                  </select></label>
                </div>

                <!-- Campo de seleção de turma para o ALUNO -->
                <div id="studentClassField" class="hidden">
                  <label>Selecione sua Turma <select id="inpStudentClass">${turmasOptions}</select></label>
                </div>

                <!-- Campo de seleção de turmas para o PROFESSOR (5º ao 9º) -->
                <div id="teacherClassField" class="hidden">
                  <label>Selecione as Turmas que você leciona (5º ao 9º Ano)</label>
                  <div class="checkbox-group">${turmasCheckboxes}</div>
                </div>

                <!-- Campo de Foto/Logo (Opcional) -->
                <div id="photoField" class="hidden">
                  <label>URL da Foto de Perfil / Logo (Opcional) <input id="inpPhoto" type="url" placeholder="https://exemplo.com/foto.jpg" /></label>
                </div>

                <div id="codeField" class="hidden"><label>Código de Acesso Institucional <input id="inpCode" type="password" /></label></div>
                <label>Senha <input id="inpPwd" type="password" minlength="6" required /></label>
                <button class="primary-btn full" type="submit" id="authBtn">Entrar</button>
              </form>
            </div>
          </div>
        </div>`;

      document.getElementById("tabLogin").onclick = () => setMode(false);
      document.getElementById("tabReg").onclick = () => setMode(true);
      
      document.getElementById("inpRole").onchange = function() {
        const role = this.value;
        $("#studentClassField").classList.toggle("hidden", role !== "student" || !isRegister);
        $("#teacherClassField").classList.toggle("hidden", role !== "teacher" || !isRegister);
        $("#codeField").classList.toggle("hidden", role === "student" || !isRegister);
      };

      document.getElementById("authForm").onsubmit = handleAuth;
      setMode(false);
    }

    function setMode(reg) {
      isRegister = reg;
      $("#tabLogin").classList.toggle("active", !reg);
      $("#tabReg").classList.toggle("active", reg);
      $("#nameField").classList.toggle("hidden", !reg);
      $("#roleField").classList.toggle("hidden", !reg);
      $("#photoField").classList.toggle("hidden", !reg);

      const role = $("#inpRole") ? $("#inpRole").value : "student";
      $("#studentClassField").classList.toggle("hidden", !reg || role !== "student");
      $("#teacherClassField").classList.toggle("hidden", !reg || role !== "teacher");
      $("#codeField").classList.toggle("hidden", !reg || role === "student");

      $("#authTitle").textContent = reg ? "Crie sua jornada" : "Entrar na jornada";
      $("#authDesc").textContent = reg ? "Escolha seu perfil e faça seu cadastro." : "Acesse seu painel.";
      $("#authBtn").textContent = reg ? "Criar conta" : "Entrar";
    }

    async function handleAuth(e) {
      e.preventDefault();
      const email = $("#inpEmail").value.trim();
      const pwd = $("#inpPwd").value;

      if (!email || pwd.length < 6) return toast("Informe um e-mail válido e senha com pelo menos 6 caracteres.", "error");

      try {
        if (isRegister) {
          const name = $("#inpName").value.trim();
          const role = $("#inpRole").value;
          const photoURL = $("#inpPhoto").value.trim();
          const code = $("#inpCode") ? $("#inpCode").value.trim() : "";

          if (!name) return toast("Informe seu nome completo.", "error");

          let selectedClasses = [];
          let studentClass = "";

          if (role === "teacher") {
            if (code !== PROFESSOR_CODE) return toast("Código de acesso de professor inválido.", "error");
            const checkedBoxes = document.querySelectorAll('input[name="teacherClasses"]:checked');
            selectedClasses = Array.from(checkedBoxes).map(cb => cb.value);
            if (selectedClasses.length === 0) return toast("Selecione pelo menos uma turma do 5º ao 9º ano.", "error");
          } else if (role === "coordinator") {
            if (code !== COORDINATOR_CODE) return toast("Código de acesso de coordenador inválido.", "error");
            selectedClasses = TURMAS_DISPONIVEIS;
          } else {
            studentClass = $("#inpStudentClass").value;
            selectedClasses = [studentClass];
          }

          const cred = await auth.createUserWithEmailAndPassword(email, pwd);
          await db.collection("users").doc(cred.user.uid).set({
            name, email, role, photoURL,
            className: role === "student" ? studentClass : selectedClasses.join(", "),
            classes: selectedClasses,
            xp: 0, cactoscoins: 0, level: 1, booksRead: 0, isActive: true,
            createdAt: new Date().toISOString()
          });
          toast("Conta criada com sucesso!", "success");
        } else {
          await auth.signInWithEmailAndPassword(email, pwd);
        }
      } catch(err) {
        const msgs = {
          "auth/invalid-credential": "E-mail ou senha inválidos.",
          "auth/email-already-in-use": "Este e-mail já está em uso.",
          "auth/too-many-requests": "Muitas tentativas. Aguarde um momento."
        };
        toast(msgs[err.code] || "Erro ao autenticar.", "error");
        console.error(err);
      }
    }

    // --- APP INITIALIZATION ---
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        currentUser = null; currentProfile = null;
        renderAuth();
        return;
      }
      try {
        const snap = await db.collection("users").doc(user.uid).get();
        if (snap.exists) {
          currentUser = user;
          currentProfile = { uid: user.uid, ...snap.data() };
          await seedInitialData();
          renderApp();
        } else {
          renderAuth();
        }
      } catch(err) {
        console.error(err);
        renderAuth();
      }
    });

    document.getElementById("closeModalBtn").onclick = closeModal;
    document.getElementById("modal").onclick = (e) => {
      if (e.target === document.getElementById("modal")) closeModal();
    };
  </script>
</body>
</html>
