<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sertão Literário</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Firebase Compat Libraries -->
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-storage-compat.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --text: #172033;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #f59e0b;
      --primary-dark: #d97706;
      --green: #22c55e;
      --green-dark: #15803d;
      --cyan: #06b6d4;
      --pink: #ec4899;
      --danger: #ef4444;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    body.dark {
      --bg: #0f172a;
      --surface: #172033;
      --surface2: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #334155;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 0%, rgba(245, 158, 11, 0.10), transparent 25%), var(--bg);
      color: var(--text);
      transition: background .25s, color .25s;
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    .hidden { display: none !important; }

    /* Toast Notifications */
    .toast {
      position: fixed; right: 22px; top: 22px; z-index: 50;
      max-width: 380px; padding: 16px 20px; border-radius: 14px;
      color: white; background: #172033; box-shadow: var(--shadow);
      transform: translateY(-12px); opacity: 0; transition: .25s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--green-dark); }
    .toast.error { background: #b91c1c; }

    /* Auth Page */
    .auth-layout { min-height: 100vh; display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(380px, 0.9fr); }
    .auth-hero {
      position: relative; overflow: hidden; padding: 70px clamp(30px, 7vw, 110px);
      color: white;
      background: linear-gradient(135deg, rgba(15,23,42,0.88), rgba(21,128,61,0.70)),
                  url('https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=1600&q=85') center/cover;
    }
    .auth-hero::after {
      content: '🌵'; position: absolute; right: 7%; bottom: -30px;
      font-size: 180px; opacity: 0.20; transform: rotate(-8deg);
    }
    .auth-hero-content { position: relative; z-index: 1; max-width: 620px; margin-top: 18vh; }
    .auth-hero-content h1 { font-family: 'Baloo 2', cursive; font-size: clamp(50px, 6vw, 80px); line-height: 0.95; margin: 20px 0; }
    .auth-hero-content p { max-width: 560px; color: rgba(255,255,255,0.85); font-size: 18px; line-height: 1.7; }

    .auth-panel { display: grid; place-items: center; padding: 30px; background: var(--surface); }
    .auth-card { width: min(100%, 470px); padding: 40px; border: 1px solid var(--border); border-radius: 28px; background: var(--surface); box-shadow: var(--shadow); }
    .auth-card h2 { font-family: 'Baloo 2', cursive; font-size: 32px; margin-bottom: 8px; }
    .auth-card > p { color: var(--muted); margin-bottom: 28px; }

    .auth-tabs {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 5px; margin-bottom: 24px;
      border-radius: 14px; background: var(--surface2);
    }
    .auth-tabs button { padding: 12px; border-radius: 10px; color: var(--muted); background: transparent; font-weight: 600; }
    .auth-tabs button.active { color: var(--text); background: var(--surface); box-shadow: 0 4px 14px rgba(15,23,42,0.08); }

    /* Form Components */
    .form-grid { display: grid; gap: 16px; }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 13px; font-weight: 600; }
    input, select, textarea {
      width: 100%; padding: 14px 15px; border: 1px solid var(--border); border-radius: 13px;
      outline: none; color: var(--text); background: var(--surface2); transition: border .2s;
    }
    textarea { min-height: 90px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(245,158,11,0.14); }

    .checkbox-group {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; padding: 10px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 13px;
    }
    .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); cursor: pointer; }
    .checkbox-item input { width: auto; }

    .primary-btn, .secondary-btn, .danger-btn, .btn-editar {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 44px; padding: 10px 18px; border-radius: 13px; font-weight: 700; transition: .2s;
    }
    .primary-btn { color: white; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
    .secondary-btn, .btn-editar { color: var(--text); border: 1px solid var(--border); background: var(--surface2); }
    .danger-btn { color: white; background: var(--danger); }
    .primary-btn:hover, .secondary-btn:hover, .danger-btn:hover, .btn-editar:hover { transform: translateY(-2px); }
    .full { width: 100%; }

    /* Main App Layout */
    .app-shell { min-height: 100vh; padding-bottom: 92px; }
    .topbar {
      position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between;
      gap: 18px; padding: 18px clamp(18px, 5vw, 70px);
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 86%, transparent); backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 10px; font-family: 'Baloo 2', cursive; font-size: 24px; font-weight: 800; }
    .brand-mark { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 14px; background: linear-gradient(135deg, var(--primary), var(--green)); font-size: 24px; overflow: hidden; }
    .brand-mark img { width: 100%; height: 100%; object-fit: cover; }
    
    .top-actions { display: flex; align-items: center; gap: 10px; }
    .icon-btn { width: 42px; height: 42px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: 12px; color: var(--text); background: var(--surface); }
    .user-pill { display: flex; align-items: center; gap: 10px; padding: 5px 14px 5px 5px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); }
    
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      color: white; font-weight: 800; font-size: 14px;
      display: grid; place-items: center; overflow: hidden; flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .page { width: min(1400px, 100%); margin: 0 auto; padding: 34px clamp(18px, 5vw, 70px); }
    .page-title { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 28px; }
    .page-title h1 { font-family: 'Baloo 2', cursive; font-size: clamp(36px, 5vw, 52px); line-height: 1; }
    .page-title p { margin-top: 7px; color: var(--muted); }

    /* Dashboard Widgets */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .stat-card {
      position: relative; overflow: hidden; padding: 22px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow);
    }
    .stat-card::after { content: ''; position: absolute; right: -20px; bottom: -30px; width: 100px; height: 100px; border-radius: 50%; background: rgba(245,158,11,0.10); }
    .stat-label { color: var(--muted); font-size: 13px; font-weight: 600; }
    .stat-value { font-family: 'Baloo 2', cursive; font-size: 34px; line-height: 1; margin-top: 7px; }
    .stat-icon { margin-bottom: 8px; font-size: 26px; }

    .panel { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); padding: 24px; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
    .panel-header h2 { font-family: 'Baloo 2', cursive; font-size: 24px; }
    .content-grid { display: grid; grid-template-columns: 1.35fr 0.65fr; gap: 18px; margin-top: 18px; }

    .progress-list { display: grid; gap: 18px; }
    .progress-info { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 13px; }
    .progress { height: 10px; border-radius: 99px; background: var(--surface2); overflow: hidden; }
    .progress > div { height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--primary), var(--green)); }

    .ranking { display: grid; gap: 10px; }
    .ranking-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 14px; background: var(--surface2); cursor: pointer; transition: transform .15s; }
    .ranking-item:hover { transform: translateX(4px); }
    .ranking-pos { width: 26px; color: var(--primary-dark); font-weight: 800; text-align: center; }
    .ranking-name { flex: 1; font-weight: 600; }
    .xp-badge { padding: 5px 9px; border-radius: 8px; color: var(--green-dark); background: rgba(34,197,94,0.13); font-size: 12px; font-weight: 700; }

    /* Book Cards & Styles */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
    .book-card, .card-livro, .post-card, .campaign-card { overflow: hidden; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); display: flex; flex-direction: column; }
    .book-cover { height: 190px; display: grid; place-items: center; background: linear-gradient(135deg, #f59e0b, #15803d); color: white; font-family: 'Baloo 2', cursive; font-size: 32px; overflow: hidden; position: relative; }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; }
    .book-content, .post-content, .campaign-content { padding: 18px; flex: 1; display: flex; flex-direction: column; }
    .book-content h3, .campaign-content h3, .card-livro .titulo { margin-bottom: 3px; font-family: 'Baloo 2', cursive; font-size: 20px; }
    .book-content p.autor, .card-livro .autor { color: var(--muted); font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    
    /* Resumo / Sinopse do Livro */
    .card-livro .resumo {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      font-style: italic;
      margin: 8px 0 12px 0;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      background: var(--surface2);
      padding: 8px 10px;
      border-radius: 10px;
      border-left: 3px solid var(--primary);
    }

    .book-meta, .card-livro .acoes { display: flex; align-items: center; justify-content: space-between; margin-top: auto; gap: 8px; flex-wrap: wrap; }

    .tag, .status { display: inline-flex; padding: 6px 10px; border-radius: 999px; color: var(--green-dark); background: rgba(34,197,94,0.13); font-size: 11px; font-weight: 700; margin-bottom: 6px; align-self: flex-start; }

    .post-video { height: 220px; display: grid; place-items: center; background: linear-gradient(135deg, #06b6d4, #ec4899); color: white; font-size: 48px; }
    .post-actions { display: flex; gap: 12px; margin-top: 14px; }
    .post-actions button { padding: 6px 10px; border-radius: 999px; color: var(--muted); background: var(--surface2); }

    .student-card {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 14px 18px; border: 1px solid var(--border); border-radius: 16px; background: var(--surface2);
      cursor: pointer; transition: transform .2s, border-color .2s;
    }
    .student-card:hover { transform: translateY(-2px); border-color: var(--primary); }

    .tab-pills { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px; }
    .tab-pill { padding: 8px 16px; border-radius: 999px; background: var(--surface2); border: 1px solid var(--border); font-weight: 600; font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; }
    .tab-pill.active { background: var(--primary); color: white; border-color: var(--primary); }

    .empty-state { padding: 40px 20px; color: var(--muted); text-align: center; }

    /* Modal */
    .modal {
      position: fixed; inset: 0; z-index: 40; display: grid; place-items: center; padding: 20px;
      background: rgba(15,23,42,0.55); backdrop-filter: blur(5px);
    }
    .modal-card { width: min(100%, 620px); max-height: calc(100vh - 40px); overflow-y: auto; padding: 28px; border: 1px solid var(--border); border-radius: 24px; background: var(--surface); box-shadow: var(--shadow); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-header h2 { font-family: 'Baloo 2', cursive; font-size: 28px; }

    /* Bottom Navigation Bar */
    .bottom-nav {
      position: fixed; left: 50%; bottom: 16px; z-index: 20;
      width: min(720px, calc(100% - 28px));
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 7px;
      border: 1px solid var(--border); border-radius: 22px;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow); backdrop-filter: blur(16px);
      transform: translateX(-50%);
    }
    .nav-btn { display: grid; justify-items: center; gap: 3px; padding: 9px 4px; border-radius: 14px; color: var(--muted); background: transparent; font-size: 11px; font-weight: 600; }
    .nav-btn span:first-child { font-size: 20px; }
    .nav-btn.active { color: var(--primary-dark); background: rgba(245,158,11,0.12); }

    .section-space { margin-top: 28px; }
    .muted { color: var(--muted); }
    .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }

    @media (max-width: 1050px) {
      .auth-layout { grid-template-columns: 1fr; }
      .auth-hero { min-height: 300px; }
      .auth-hero-content { margin-top: 30px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .content-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .auth-hero { min-height: 250px; padding: 24px 18px; }
      .auth-hero-content h1 { font-size: 38px; }
      .auth-panel { padding: 18px; }
      .auth-card { padding: 20px; }
      .topbar { padding: 14px 18px; }
      .page { padding: 20px 16px 100px; }
      .page-title { flex-direction: column; align-items: flex-start; }
      .stats-grid, .cards-grid { grid-template-columns: 1fr; }
      .bottom-nav { bottom: 10px; }
    }
  </style>
</head>
<body>

  <div id="app"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modalTitle">Título</h2>
        <button id="closeModalBtn" class="icon-btn">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyA-xVOI6qXkEndKXkSp6-zRLY01qNkQH4E",
      authDomain: "sertao-literario-booktok.firebaseapp.com",
      projectId: "sertao-literario-booktok",
      storageBucket: "sertao-literario-booktok.firebasestorage.app",
      messagingSenderId: "291651799720",
      appId: "1:291651799720:web:b5c79954511f09b8ddd09d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const PROFESSOR_CODE = "SERTAO-PROF-2026";
    const COORDINATOR_CODE = "SERTAO-COORD-2026";
    const TURMAS_DISPONIVEIS = ["5º Ano", "6º Ano", "7º Ano", "8º Ano", "9º Ano"];

    let currentUser = null;
    let currentProfile = null;
    let currentPage = "home";
    let selectedTeacherClass = "5º Ano";
    let currentTheme = localStorage.getItem("st-theme") || "light";

    document.body.classList.toggle("dark", currentTheme === "dark");

    // --- HELPER FUNCTIONS ---
    function $(s) { return document.querySelector(s); }
    function $$(s) { return document.querySelectorAll(s); }

    function toast(msg, type = "") {
      const t = $("#toast");
      t.textContent = msg;
      t.className = "toast show " + type;
      setTimeout(() => { t.className = "toast"; }, 3500);
    }

    function initials(name) {
      return (name || "SL").split(" ").slice(0, 2).map(w => w[0]).join("").toUpperCase();
    }

    function roleLabel(r) {
      const map = { student: "Aluno", teacher: "Professor", coordinator: "Coordenador" };
      return map[r] || "Usuário";
    }

    function openModal(title, body) {
      $("#modalTitle").textContent = title;
      $("#modalBody").innerHTML = body;
      $("#modal").classList.remove("hidden");
    }

    function closeModal() {
      $("#modal").classList.add("hidden");
    }

    function pageTitle(title, desc, extra = "") {
      return `<div class="page-title"><div><h1>${title}</h1><p>${desc}</p></div>${extra}</div>`;
    }

    function statCard(icon, label, value) {
      return `<div class="stat-card"><div class="stat-icon">${icon}</div><div class="stat-label">${label}</div><div class="stat-value">${value}</div></div>`;
    }

    function renderAvatar(photoURL, name) {
      if (photoURL) {
        return `<div class="avatar"><img src="${photoURL}" alt="Perfil" /></div>`;
      }
      return `<div class="avatar">${initials(name)}</div>`;
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // --- INITIAL SEED DATA ---
    async function seedInitialData() {
      try {
        const booksSnap = await db.collection("books").get();
        if (booksSnap.empty) {
          const initialBooks = [
            { 
              title: "O Senhor dos Anéis", 
              author: "J.R.R. Tolkien", 
              pages: 1200, 
              category: "Fantasia", 
              summary: "Uma épica jornada na Terra-média para destruir o Um Anel e derrotar o Senhor do Escuro, Sauron.",
              coverUrl: "", 
              pdfUrl: "", 
              status: "Disponível", 
              isActive: true, 
              createdAt: new Date().toISOString() 
            },
            { 
              title: "O Auto da Compadecida", 
              author: "Ariano Suassuna", 
              pages: 208, 
              category: "Teatro / Sertão", 
              summary: "As aventuras astutas de João Grilo e Chicó no sertão paraibano, cheias de humor, religiosidade e crítica social.",
              coverUrl: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?auto=format&fit=crop&w=400&q=80", 
              pdfUrl: "", 
              status: "Disponível", 
              isActive: true, 
              createdAt: new Date().toISOString() 
            },
            { 
              title: "Vidas Secas", 
              author: "Graciliano Ramos", 
              pages: 176, 
              category: "Literatura Sertaneja", 
              summary: "A emocionante luta da família de Fabiano contra a seca impiedosa no sertão nordestino.",
              coverUrl: "https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=400&q=80", 
              pdfUrl: "", 
              status: "Disponível", 
              isActive: true, 
              createdAt: new Date().toISOString() 
            },
            { 
              title: "O Pequeno Príncipe", 
              author: "Antoine de Saint-Exupéry", 
              pages: 96, 
              category: "Infanto-Juvenil", 
              summary: "Uma fábula Poética e filosófica sobre a amizade, o amor e o olhar puro da infância.",
              coverUrl: "", 
              pdfUrl: "", 
              status: "Disponível", 
              isActive: true, 
              createdAt: new Date().toISOString() 
            }
          ];
          for (const b of initialBooks) { await db.collection("books").add(b); }
        }

        const missionsSnap = await db.collection("missions").get();
        if (missionsSnap.empty) {
          const initialMissions = [
            { title: "🌵 Resenha Sertaneja", description: "Grave uma resenha em vídeo de 1 minuto no BookTok sobre um livro regional.", coins: 100, isActive: true, createdAt: new Date().toISOString() },
            { title: "📖 Maratona de Leitura", description: "Leia e registre 50 páginas de qualquer livro da biblioteca.", coins: 80, isActive: true, createdAt: new Date().toISOString() }
          ];
          for (const m of initialMissions) { await db.collection("missions").add(m); }
        }

        const campaignsSnap = await db.collection("campaigns").get();
        if (campaignsSnap.empty) {
          const initialCampaigns = [
            { title: "Festival Literário do Sertão 2026", description: "Leia 3 livros até o final do mês e ganhe a insígnia exclusiva e 300 Cactoscoins!", banner: "🏜️", isActive: true, createdAt: new Date().toISOString() }
          ];
          for (const c of initialCampaigns) { await db.collection("campaigns").add(c); }
        }
      } catch (e) {
        console.error("Erro ao semear dados:", e);
      }
    }

    // --- APP LAYOUT ---
    function renderApp() {
      const p = currentProfile;
      const icons = ["🏠","📚","🛍️","🎬","👤"];
      const labels = ["Home","Biblioteca","Loja","BookTok","Perfil"];
      const pages = ["home","library","store","booktok","profile"];

      let navHtml = pages.map((page, i) => 
        `<button class="nav-btn${page === currentPage ? ' active' : ''}" data-page="${page}">
          <span>${icons[i]}</span><span>${labels[i]}</span>
        </button>`
      ).join("");

      $("#app").innerHTML = `
        <div class="app-shell">
          <header class="topbar">
            <div class="brand">
              <div class="brand-mark">${p.photoURL ? `<img src="${p.photoURL}"/>` : '🌵'}</div>

              <button id="themeBtn" class="icon-btn">${currentTheme === "dark" ? "☀" : "☾"}</button>

    function loadPage() {
      const pages = {
        home: renderHome,
        library: renderLibrary,

        booktok: renderBookTok,
        profile: renderProfile
      };
      pages[currentPage]();

    // --- HOME PAGE & DASHBOARD ---
    async function renderHome() {
      const p = currentProfile;
      const isStu = p.role === "student";
      const isStaff = !isStu;

      const userClasses = Array.isArray(p.classes) && p.classes.length > 0 ? p.classes : [p.className || "5º Ano"];
      if (!userClasses.includes(selectedTeacherClass)) {
        selectedTeacherClass = userClasses[0];
      }

      const booksRead = p.booksRead || 0;
      const xp = p.xp || 0;
      const coins = p.cactoscoins || 0;
      const level = p.level || 1;

      let studentRankingHtml = '<div class="empty-state">Carregando dados...</div>';

      if (isStu) {
        try {
          const snap = await db.collection("users").where("role", "==", "student").where("className", "==", p.className).get();
          const students = [];
          snap.forEach(d => students.push({ id: d.id, ...d.data() }));
          students.sort((a,b) => (b.xp || 0) - (a.xp || 0));
          
          if (students.length) {
            studentRankingHtml = students.slice(0, 5).map((u, i) => `
              <div class="ranking-item" onclick="viewStudentDetails('${u.id}')">
                <div class="ranking-pos">${i+1}</div>
                ${renderAvatar(u.photoURL, u.name)}
                <div class="ranking-name">${u.name}</div>
                <span class="xp-badge">${u.xp || 0} XP</span>
              </div>
            `).join("");
          } else {
            studentRankingHtml = '<div class="empty-state">Sem alunos cadastrados nesta turma.</div>';
          }
        } catch(e) { console.error(e); }
      }

      $("#pageContent").innerHTML =
        pageTitle(`Olá, ${(p.name || "").split(" ")[0]}!`, isStu ? `Turma: ${p.className}` : `Painel do ${roleLabel(p.role)}`) +
        `<div class="stats-grid">
          ${isStu ? statCard("🌵","Cactoscoins",coins) : statCard("👥","Suas Turmas", userClasses.length)}
          ${isStu ? statCard("⭐","XP Total",xp) : statCard("📖","Turma Atual", selectedTeacherClass)}
          ${isStu ? statCard("🏅","Nível",level) : statCard("🎯","Missões Ativas","Disponíveis")}
          ${isStu ? statCard("📚","Livros Lidos",booksRead) : statCard("🌵","Sertão Literário","2026")}
        </div>

        ${isStaff ? `
        <section class="panel section-space">
          <div class="panel-header">
            <h2>Alunos por Turma</h2>
          </div>
          <div class="tab-pills">
            ${userClasses.map(c => `
              <button class="tab-pill ${c === selectedTeacherClass ? 'active' : ''}" onclick="selectClass('${c}')">${c}</button>
            `).join("")}
          </div>
          <div id="studentsListContainer" class="cards-grid">Carregando alunos...</div>
        </section>
        ` : ''}

        <section class="panel section-space">
          <div class="panel-header">
            <h2>Campanhas Literárias 🎉</h2>
            ${isStaff ? '<button class="primary-btn" id="newCampaignBtn">+ Nova Campanha</button>' : ''}
          </div>
          <div id="campaignsContainer" class="cards-grid">Carregando campanhas...</div>
        </section>

        ${isStu ? `
        <div class="content-grid">
          <section class="panel">
            <div class="panel-header"><h2>Metas de Leitura</h2></div>
            <div class="progress-list">
              <div><div class="progress-info"><span>Meta Bimestral</span><strong>${booksRead} de 10</strong></div><div class="progress"><div style="width:${Math.min(booksRead/10*100,100)}%"></div></div></div>
              <div><div class="progress-info"><span>Meta Semestral</span><strong>${booksRead} de 30</strong></div><div class="progress"><div style="width:${Math.min(booksRead/30*100,100)}%"></div></div></div>
            </div>
          </section>
          <section class="panel">
            <div class="panel-header"><h2>Ranking da Turma</h2><span class="tag">Top 5</span></div>
            <div class="ranking">${studentRankingHtml}</div>
          </section>
        </div>` : ''}

        <section class="panel section-space">
          <div class="panel-header">
            <h2>Missões & Desafios 🎯</h2>
            ${isStaff ? '<button class="primary-btn" id="newMissionBtn">+ Criar Desafio</button>' : ''}
          </div>
          <div id="missionsContainer"><div class="empty-state">Carregando missões...</div></div>
        </section>`;

      if (isStaff) {
        $("#newCampaignBtn").onclick = () => showCampaignModal();
        $("#newMissionBtn").onclick = () => showMissionModal();
        loadStudentsByClass(selectedTeacherClass);
      }

      loadCampaigns();
      loadMissions();
    }

    window.selectClass = function(className) {
      selectedTeacherClass = className;
      renderHome();
    };

    async function loadStudentsByClass(className) {
      const container = $("#studentsListContainer");
      if (!container) return;
      try {
        const snap = await db.collection("users")
          .where("role", "==", "student")
          .where("className", "==", className)
          .get();

        if (snap.empty) {
          container.innerHTML = `<div class="empty-state">Nenhum aluno cadastrado na turma ${className}.</div>`;
          return;
        }

        let html = "";
        snap.forEach(d => {
          const st = { id: d.id, ...d.data() };
          html += `
            <div class="student-card" onclick="viewStudentDetails('${st.id}')">
              <div class="flex" style="gap:12px">
                ${renderAvatar(st.photoURL, st.name)}
                <div>
                  <strong>${st.name}</strong>
                  <div class="muted" style="font-size:12px">📚 ${st.booksRead || 0} lidos • ⭐ ${st.xp || 0} XP</div>
                </div>
              </div>
              <span class="xp-badge">🌵 ${st.cactoscoins || 0}</span>
            </div>`;
        });
        container.innerHTML = html;
      } catch(e) {
        console.error(e);
        container.innerHTML = `<div class="empty-state">Erro ao carregar alunos.</div>`;
      }
    }

    // --- STUDENT DETAILS MODAL ---

        const readings = [];
        readingsSnap.forEach(d => readings.push(d.data()));

          <div class="ranking-item" style="cursor:default">
            <span>📖</span>
            <div class="ranking-name">
              <strong>${r.bookTitle}</strong>
              <div class="muted" style="font-size:11px">${r.pagesRead} páginas • Data: ${r.readingDate || 'N/I'}</div>

              <h3 style="font-family:'Baloo 2',cursive;font-size:22px">${st.name}</h3>

            </div>
          </div>

          <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
            <div class="stat-card" style="padding:14px"><div class="stat-label">Cactoscoins</div><div class="stat-value" style="font-size:24px">🌵 ${st.cactoscoins || 0}</div></div>
            <div class="stat-card" style="padding:14px"><div class="stat-label">XP Total</div><div class="stat-value" style="font-size:24px">⭐ ${st.xp || 0}</div></div>
            <div class="stat-card" style="padding:14px"><div class="stat-label">Livros Lidos</div><div class="stat-value" style="font-size:24px">📚 ${st.booksRead || 0}</div></div>

    window.viewStudentDetails = viewStudentDetails;

    // --- CAMPAIGNS MODULE ---
    async function loadCampaigns() {
      try {
        const snap = await db.collection("campaigns").where("isActive","==",true).get();
        const el = $("#campaignsContainer");
        if (snap.empty) { el.innerHTML = '<div class="empty-state">Nenhuma campanha ativa no momento.</div>'; return; }
        let html = "";
        const isStaff = currentProfile.role !== "student";

        snap.forEach(d => {
          const c = { id: d.id, ...d.data() };
          html += `
            <article class="campaign-card">
              <div class="book-cover">${c.banner || '🏜️'}</div>
              <div class="campaign-content">
                <span class="tag">Campanha Literária</span>
                <h3>${c.title}</h3>
                <p>${c.description}</p>
                ${isStaff ? `
                <div class="flex" style="margin-top:10px">
                  <button class="secondary-btn" style="font-size:12px;padding:6px 12px" onclick="showCampaignModal('${c.id}', '${encodeURIComponent(JSON.stringify(c))}')">Editar</button>

    function showCampaignModal(id = null, dataJson = null) {
      const data = dataJson ? JSON.parse(decodeURIComponent(dataJson)) : {};
      openModal(id ? "Editar Campanha" : "Nova Campanha", `
        <form id="campaignForm" class="form-grid">
          <label>Título <input name="title" value="${data.title || ''}" required /></label>
          <label>Descrição <textarea name="description" required>${data.description || ''}</textarea></label>
          <label>Ícone / Banner Emoji <input name="banner" value="${data.banner || '🌵'}" placeholder="Ex: 🏜️ ou 📜" /></label>
          <button class="primary-btn full" type="submit">${id ? 'Salvar Alterações' : 'Criar Campanha'}</button>
        </form>`);

      document.getElementById("campaignForm").onsubmit = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const payload = {
          title: fd.get("title"),
          description: fd.get("description"),
          banner: fd.get("banner"),
          isActive: true,
          updatedAt: new Date().toISOString()
        };

        if (id) {
          await db.collection("campaigns").doc(id).update(payload);
          toast("Campanha atualizada!", "success");
        } else {
          payload.createdAt = new Date().toISOString();
          await db.collection("campaigns").add(payload);
          toast("Campanha criada com sucesso!", "success");
        }
        closeModal();
        renderHome();
      };
    }
    window.showCampaignModal = showCampaignModal;

    async function deleteCampaign(id) {
      if (confirm("Deseja realmente excluir esta campanha?")) {
        await db.collection("campaigns").doc(id).delete();
        toast("Campanha removida.");
        renderHome();
      }
    }
    window.deleteCampaign = deleteCampaign;

        snap.forEach(d => {

                <span class="reward" style="color:var(--primary-dark);font-weight:800">+${m.coins || 0} 🌵</span>

    // --- FUNCTION TO EDIT BOOK ---
    async function abrirModalEdicao(id) {
      try {
        const doc = await db.collection("books").doc(String(id)).get();
        if (!doc.exists) {
          toast("Livro não encontrado.", "error");
          return;
        }
        const book = doc.data();

        openModal("✏️ Editar Livro", `
          <form id="editBookForm" class="form-grid">
            <label>Título <input name="title" value="${book.title || ''}" required /></label>
            <label>Autor <input name="author" value="${book.author || ''}" required /></label>
            <label>Status <input name="status" value="${book.status || 'Disponível'}" required /></label>
            <label>Páginas <input name="pages" type="number" min="1" value="${book.pages || 0}" required /></label>
            <label>Categoria <input name="category" value="${book.category || ''}" /></label>

            <label>URL da Capa <input name="coverUrl" value="${book.coverUrl || ''}" /></label>
            <label>Link do PDF <input name="pdfUrl" value="${book.pdfUrl || ''}" /></label>
            <button class="primary-btn full" type="submit">Salvar Alterações</button>
          </form>
        `);

        $("#editBookForm").onsubmit = async (e) => {

            title: fd.get("title"),
            author: fd.get("author"),
            status: fd.get("status"),
            pages: Number(fd.get("pages")),
            category: fd.get("category"),
            summary: fd.get("summary"),
            coverUrl: fd.get("coverUrl"),
            pdfUrl: fd.get("pdfUrl")
          });
          closeModal();
          toast("Livro atualizado com sucesso!", "success");
          renderLibrary();
        };

        toast("Erro ao carregar modal de edição.", "error");
      }
    }
    window.abrirModalEdicao = abrirModalEdicao;

    // --- LIBRARY PAGE ---
    async function renderLibrary() {
      let books = [];
      try {
        const snap = await db.collection("books").get();
        snap.forEach(d => {
          const b = d.data();
          if (b.isActive !== false) {
            books.push({ id: d.id, ...b });
          }
        });
        books.sort((a,b) => (a.title || "").localeCompare(b.title || ""));
      } catch(e) { console.error("Erro ao buscar livros:", e); }

      const isStaff = currentProfile.role !== "student";

      let booksHtml = books.length ? "" : '<div class="empty-state">Nenhum livro cadastrado na biblioteca.</div>';
      for (let b of books) {
        const coverStyle = b.coverUrl 
          ? `<img src="${b.coverUrl}" alt="Capa" />` 
          : '📚';

        booksHtml += `
          <div class="card-livro book-card" data-id="${b.id}">
            <div class="book-cover">${coverStyle}</div>
            <div class="book-content">
              <span class="status">${b.status || "Disponível"}</span>
              <h3 class="titulo">${b.title}</h3>
              <p class="autor">${b.author || "Autor não informado"}</p>
              ${b.summary ? `<p class="resumo">"${b.summary}"</p>` : ''}
              <div class="acoes book-meta">
                ${b.pdfUrl ? `<a class="secondary-btn" href="${b.pdfUrl}" target="_blank" style="font-size:12px">📄 PDF</a>` : ''}
                <button class="btn-editar" onclick="abrirModalEdicao('${b.id}')">✏️ Editar</button>
                ${isStaff ? `<button class="danger-btn" style="font-size:12px;padding:6px 10px" data-del="${b.id}">Excluir</button>` : ''}
                ${!isStaff ? `<button class="primary-btn" style="font-size:12px;padding:6px 10px" data-read="${b.title.replace(/"/g,"&quot;")}">Registrar Leitura</button>` : ''}
              </div>
            </div>
          </div>`;
      }

      $("#pageContent").innerHTML =
        pageTitle("Biblioteca Sertaneja", isStaff ? "Cadastre e gerencie o acervo da escola." : "Escolha sua leitura e registre seu progresso.", isStaff ? '<button class="primary-btn" id="addBookBtn">+ Cadastrar Livro</button>' : "") +
        `<div class="panel">
          <div class="flex" style="margin-bottom:18px"><input id="searchInput" placeholder="🔍 Buscar por título, autor ou palavra-chave..." style="flex:1" /></div>
          <div id="booksGrid" class="cards-grid">${booksHtml}</div>
        </div>`;

      $("#searchInput").oninput = (e) => {
        const t = e.target.value.toLowerCase();
        $$(".card-livro").forEach(card => {
          card.style.display = card.textContent.toLowerCase().includes(t) ? "" : "none";
        });
      };

      const addBtn = $("#addBookBtn");
      if (addBtn) {
        addBtn.onclick = () => {
          openModal("Cadastrar Novo Livro", `
            <form id="bookForm" class="form-grid">
              <label>Título <input name="title" required /></label>
              <label>Autor <input name="author" required /></label>
              <label>Páginas <input name="pages" type="number" min="1" required /></label>
              <label>Categoria <input name="category" value="Literatura Sertaneja" /></label>
              <label>Resumo / Sinopse <textarea name="summary" placeholder="Escreva um breve resumo da obra..."></textarea></label>
              
              <label>Capa - Escolher Imagem do Dispositivo / Galeria
                <input type="file" id="inpCoverFile" accept="image/*" />
              </label>
              <label>Ou Link/URL da Capa na Web
                <input name="coverUrl" id="inpCoverUrl" placeholder="https://exemplo.com/capa.jpg" />
              </label>

              <label>Link do PDF (Opcional) <input name="pdfUrl" type="url" placeholder="https://..." /></label>
              <button class="primary-btn full" type="submit">Salvar Livro na Biblioteca</button>
            </form>`);

          $("#bookForm").onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const fileInput = $("#inpCoverFile");

            let coverUrl = fd.get("coverUrl");

            if (fileInput && fileInput.files && fileInput.files[0]) {
              try {
                coverUrl = await fileToDataUrl(fileInput.files[0]);
              } catch(err) {
                console.error("Erro ao converter arquivo de capa:", err);
              }
            }

            await db.collection("books").add({
              title: fd.get("title"),
              author: fd.get("author"),
              pages: Number(fd.get("pages")),
              category: fd.get("category"),
              summary: fd.get("summary") || "",
              coverUrl: coverUrl || "",
              pdfUrl: fd.get("pdfUrl") || "",
              status: "Disponível",
              isActive: true,
              createdAt: new Date().toISOString()
            });

            closeModal();
            toast("Livro cadastrado com sucesso!", "success");
            renderLibrary();
          };
        };
      }

      $$("[data-del]").forEach(btn => {
        btn.onclick = async function() {
          if (confirm("Excluir este livro?")) {
            await db.collection("books").doc(this.dataset.del).delete();
            toast("Livro removido.");
            renderLibrary();
          }
        };
      });

      $$("[data-read]").forEach(btn => {
        btn.onclick = function() {
          const title = this.dataset.read;
          openModal("Registrar Leitura", `
            <form id="readForm" class="form-grid">
              <label>Livro <input name="bookTitle" value="${title}" readonly /></label>
              <label>Páginas Lidas <input name="pages" type="number" min="1" required /></label>
              <label>Data <input name="date" type="date" required value="${new Date().toISOString().split('T')[0]}" /></label>
              <button class="primary-btn full" type="submit">Enviar Registro</button>
            </form>`);

          $("#readForm").onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            await db.collection("readings").add({
              userId: currentUser.uid, userName: currentProfile.name,
              bookTitle: fd.get("bookTitle"), pagesRead: Number(fd.get("pages")),
              readingDate: fd.get("date"), status: "pending",
              createdAt: new Date().toISOString()
            });
            closeModal();
            toast("Registro de leitura enviado!", "success");
          };
        };
      });
    }

    // --- STORE PAGE ---
    async function renderStore() {
      const isStu = currentProfile.role === "student";
      const coins = currentProfile.cactoscoins || 0;

      const defaultItems = [
        { title: "Marca-Página Sertão", description: "Design exclusivo sertanejo", priceCoins: 50, requiredXp: 0, icon: "🔖" },
        { title: "Botton Sertão Literário", description: "Pin colecionável de leitor", priceCoins: 100, requiredXp: 100, icon: "🏅" },
        { title: "Vale-Livro Físico", description: "Troque por um livro novo na escola", priceCoins: 300, requiredXp: 300, icon: "📖" }
      ];

      let itemsHtml = defaultItems.map((it, i) => `
        <article class="book-card">
          <div class="book-cover">${it.icon}</div>
          <div class="book-content">
            <h3>${it.title}</h3>
            <p>${it.description}</p>
            <div class="book-meta">
              <strong>🌵 ${it.priceCoins} • ⭐ ${it.requiredXp} XP</strong>
              ${isStu ? `<button class="primary-btn" data-buy="${i}">Comprar</button>` : ''}
            </div>
          </div>
        </article>`).join("");

      $("#pageContent").innerHTML =
        pageTitle("Loja Literária", isStu ? "Troque suas Cactoscoins por recompensas!" : "Recompensas para os alunos.") +
        `<div class="stats-grid" style="margin-bottom:18px">
          ${statCard("🌵","Seu Saldo", coins)}
          ${statCard("⭐","Seu XP", currentProfile.xp || 0)}
        </div>
        <div class="cards-grid">${itemsHtml}</div>`;

      if (isStu) {
        $$("[data-buy]").forEach(btn => {
          btn.onclick = function() {
            const item = defaultItems[this.dataset.buy];
            if (coins < item.priceCoins) return toast("Cactoscoins insuficientes.", "error");
            toast("Item resgatado com sucesso!", "success");
          };
        });
      }
    }

    // --- BOOKTOK PAGE ---
    async function renderBookTok() {
      let posts = [];
      try {
        const snap = await db.collection("posts").where("status","==","active").get();
        snap.forEach(d => posts.push({ id: d.id, ...d.data() }));
        posts.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
      } catch(e) { console.error(e); }

      let postsHtml = posts.length ? "" : '<div class="empty-state">Nenhum vídeo publicado ainda. Seja o primeiro!</div>';
      for (let p of posts) {
        postsHtml += `
          <article class="post-card">
            <div class="post-video">${p.videoUrl ? "▶" : "🎬"}</div>
            <div class="post-content">
              <span class="tag">@${(p.userName || "usuario").toLowerCase().replace(/\s/g,"")}</span>
              <h3>${p.title}</h3>
              <p>${p.description || ""}</p>
              <div class="post-actions">
                <button class="like-btn" data-id="${p.id}">❤️ ${p.likesCount || 0}</button>
                <button>💬 ${p.commentsCount || 0}</button>
              </div>
            </div>
          </article>`;
      }

      $("#pageContent").innerHTML =
        pageTitle("BookTok", "Compartilhe suas resenhas literárias em vídeo.", '<button class="primary-btn" id="newPostBtn">+ Nova Resenha</button>') +
        `<div class="cards-grid">${postsHtml}</div>`;

      $("#newPostBtn").onclick = () => {
        openModal("Publicar Resenha no BookTok", `
          <form id="postForm" class="form-grid">
            <label>Título do Vídeo <input name="title" required /></label>
            <label>Descrição <textarea name="description" required></textarea></label>
            <label>Link do Vídeo (YouTube/Vimeo/TikTok) <input name="videoUrl" type="url" placeholder="https://..." /></label>
            <button class="primary-btn full" type="submit">Publicar</button>
          </form>`);

        $("#postForm").onsubmit = async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          await db.collection("posts").add({
            title: fd.get("title"), description: fd.get("description"),
            videoUrl: fd.get("videoUrl"), userId: currentUser.uid,
            userName: currentProfile.name,
            likesCount: 0, commentsCount: 0, status: "active",
            createdAt: new Date().toISOString()
          });
          closeModal();
          toast("Resenha publicada!", "success");
          renderBookTok();
        };
      };

      $$(".like-btn").forEach(btn => {
        btn.onclick = async function() {
          await db.collection("posts").doc(this.dataset.id).update({
            likesCount: firebase.firestore.FieldValue.increment(1)
          });
          toast("Você curtiu a resenha!");
          renderBookTok();
        };
      });
    }

    // --- PROFILE PAGE ---
    function renderProfile() {
      const p = currentProfile;
      const turmasTexto = Array.isArray(p.classes) ? p.classes.join(", ") : (p.className || "Não definida");

      $("#pageContent").innerHTML =
        pageTitle("Meu Perfil", "Gerencie suas informações pessoais.", `<span class="tag" style="font-size:14px">${roleLabel(p.role)}</span>`) +
        `<div class="content-grid">
          <div class="panel">
            <h2 style="margin-bottom:20px">Informações Pessoais</h2>
            <div class="form-grid">
              <label>Nome Completo <input id="editName" value="${p.name || ""}" /></label>
              <label>E-mail <input value="${p.email || ""}" disabled /></label>
              <label>URL da Foto de Perfil / Logo <input id="editPhoto" value="${p.photoURL || ""}" placeholder="https://exemplo.com/foto.jpg" /></label>
              
              <label>Foto de Perfil do Dispositivo / Galeria
                <input type="file" id="editPhotoFile" accept="image/*" />
              </label>

              <label>Turma(s) Vinculada(s) <input value="${turmasTexto}" disabled /></label>
              <button id="saveBtn" class="primary-btn full">Salvar Alterações</button>
              <button id="pwdBtn" class="secondary-btn full">Alterar Senha</button>
            </div>
          </div>
          <div class="panel">
            <h2 style="margin-bottom:20px">Sua Conquista</h2>
            <div class="progress-list">
              <div class="ranking-item"><span>📚</span><span class="ranking-name">Livros Lidos</span><strong>${p.booksRead || 0}</strong></div>
              <div class="ranking-item"><span>⭐</span><span class="ranking-name">Experiência (XP)</span><strong>${p.xp || 0}</strong></div>
              <div class="ranking-item"><span>🏅</span><span class="ranking-name">Nível Atual</span><strong>${p.level || 1}</strong></div>
              <div class="ranking-item"><span>🌵</span><span class="ranking-name">Cactoscoins</span><strong>${p.cactoscoins || 0}</strong></div>
            </div>
          </div>
        </div>`;

      $("#saveBtn").onclick = async () => {
        const name = $("#editName").value.trim();
        let photoURL = $("#editPhoto").value.trim();
        const fileInput = $("#editPhotoFile");

        if (!name) return toast("Informe seu nome.", "error");

        if (fileInput && fileInput.files && fileInput.files[0]) {
          try {
            photoURL = await fileToDataUrl(fileInput.files[0]);
          } catch(e) { console.error(e); }
        }

        await db.collection("users").doc(currentUser.uid).update({ name, photoURL });
        currentProfile.name = name;
        currentProfile.photoURL = photoURL;
        toast("Perfil atualizado!", "success");
        renderApp();
      };

      $("#pwdBtn").onclick = async () => {
        const current = prompt("Senha atual:");
        if (!current) return;
        const newPwd = prompt("Nova senha (pelo menos 6 caracteres):");
        if (!newPwd || newPwd.length < 6) return toast("Nova senha inválida.", "error");
        try {
          const cred = firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, current);
          await auth.currentUser.reauthenticateWithCredential(cred);
          await auth.currentUser.updatePassword(newPwd);
          toast("Senha alterada com sucesso!", "success");
        } catch(e) { toast("Erro ao alterar senha.", "error"); }
      };
    }

    // --- AUTH MODULE ---
    let isRegister = false;

    function renderAuth() {
      if (localStorage.getItem("st-theme") === "dark") document.body.classList.add("dark");

      const turmasOptions = TURMAS_DISPONIVEIS.map(t => `<option value="${t}">${t}</option>`).join("");
      const turmasCheckboxes = TURMAS_DISPONIVEIS.map(t => `
        <label class="checkbox-item">
          <input type="checkbox" name="teacherClasses" value="${t}" /> ${t}
        </label>
      `).join("");

      $("#app").innerHTML = `
        <div class="auth-layout">
          <div class="auth-hero">
            <div class="brand"><div class="brand-mark">🌵</div><span>Sertão Literário</span></div>
            <div class="auth-hero-content">
              <h1>A leitura virou jornada.</h1>
              <p>Uma experiência literária gamificada do 5º ao 9º ano. Leia, conquiste e compartilhe resenhas!</p>
            </div>
          </div>
          <div class="auth-panel">
            <div class="auth-card">
              <h2 id="authTitle">Entrar na jornada</h2>
              <p id="authDesc">Acesse seu painel literário.</p>
              <div class="auth-tabs">
                <button id="tabLogin" class="active">Entrar</button>
                <button id="tabReg">Criar conta</button>
              </div>
              <form id="authForm" class="form-grid">
                <div id="nameField" class="hidden"><label>Nome Completo <input id="inpName" type="text" /></label></div>
                <label>E-mail <input id="inpEmail" type="email" required /></label>
                
                <div id="roleField" class="hidden">
                  <label>Perfil <select id="inpRole">
                    <option value="student">Aluno</option>
                    <option value="teacher">Professor</option>
                    <option value="coordinator">Coordenador</option>
                  </select></label>
                </div>

                <div id="studentClassField" class="hidden">
                  <label>Selecione sua Turma <select id="inpStudentClass">${turmasOptions}</select></label>
                </div>

                <div id="teacherClassField" class="hidden">
                  <label>Selecione as Turmas que leciona (5º ao 9º Ano)</label>
                  <div class="checkbox-group">${turmasCheckboxes}</div>
                </div>

                <div id="photoField" class="hidden">
                  <label>URL da Foto de Perfil / Logo <input id="inpPhoto" type="url" placeholder="https://exemplo.com/foto.jpg" /></label>
                  <label style="margin-top:6px">Ou Escolher da Galeria
                    <input type="file" id="inpPhotoFile" accept="image/*" />
                  </label>
                </div>

                <div id="codeField" class="hidden"><label>Código de Acesso Institucional <input id="inpCode" type="password" /></label></div>
                <label>Senha <input id="inpPwd" type="password" minlength="6" required /></label>
                <button class="primary-btn full" type="submit" id="authBtn">Entrar</button>
              </form>
            </div>
          </div>
        </div>`;

      $("#tabLogin").onclick = () => setMode(false);
      $("#tabReg").onclick = () => setMode(true);
      
      $("#inpRole").onchange = function() {
        const role = this.value;
        $("#studentClassField").classList.toggle("hidden", role !== "student" || !isRegister);
        $("#teacherClassField").classList.toggle("hidden", role !== "teacher" || !isRegister);
        $("#codeField").classList.toggle("hidden", role === "student" || !isRegister);
      };

      $("#authForm").onsubmit = handleAuth;
      setMode(false);
    }

    function setMode(reg) {
      isRegister = reg;
      $("#tabLogin").classList.toggle("active", !reg);
      $("#tabReg").classList.toggle("active", reg);
      $("#nameField").classList.toggle("hidden", !reg);
      $("#roleField").classList.toggle("hidden", !reg);
      $("#photoField").classList.toggle("hidden", !reg);

      const role = $("#inpRole") ? $("#inpRole").value : "student";
      $("#studentClassField").classList.toggle("hidden", !reg || role !== "student");
      $("#teacherClassField").classList.toggle("hidden", !reg || role !== "teacher");
      $("#codeField").classList.toggle("hidden", !reg || role === "student");

      $("#authTitle").textContent = reg ? "Crie sua jornada" : "Entrar na jornada";
      $("#authDesc").textContent = reg ? "Escolha seu perfil e faça seu cadastro." : "Acesse seu painel.";
      $("#authBtn").textContent = reg ? "Criar conta" : "Entrar";
    }

    async function handleAuth(e) {
      e.preventDefault();
      const email = $("#inpEmail").value.trim();
      const pwd = $("#inpPwd").value;

      if (!email || pwd.length < 6) return toast("Informe e-mail válido e senha com no mínimo 6 caracteres.", "error");

      try {
        if (isRegister) {
          const name = $("#inpName").value.trim();
          const role = $("#inpRole").value;
          let photoURL = $("#inpPhoto").value.trim();
          const fileInput = $("#inpPhotoFile");
          const code = $("#inpCode") ? $("#inpCode").value.trim() : "";

          if (!name) return toast("Informe seu nome completo.", "error");

          if (fileInput && fileInput.files && fileInput.files[0]) {
            try {
              photoURL = await fileToDataUrl(fileInput.files[0]);
            } catch(err) { console.error(err); }
          }

          let selectedClasses = [];
          let studentClass = "";

          if (role === "teacher") {
            if (code !== PROFESSOR_CODE) return toast("Código de professor inválido.", "error");
            const checkedBoxes = document.querySelectorAll('input[name="teacherClasses"]:checked');
            selectedClasses = Array.from(checkedBoxes).map(cb => cb.value);
            if (selectedClasses.length === 0) return toast("Selecione pelo menos uma turma do 5º ao 9º ano.", "error");
          } else if (role === "coordinator") {
            if (code !== COORDINATOR_CODE) return toast("Código de coordenador inválido.", "error");
            selectedClasses = TURMAS_DISPONIVEIS;
          } else {
            studentClass = $("#inpStudentClass").value;
            selectedClasses = [studentClass];
          }

          const cred = await auth.createUserWithEmailAndPassword(email, pwd);
          await db.collection("users").doc(cred.user.uid).set({
            name, email, role, photoURL,
            className: role === "student" ? studentClass : selectedClasses.join(", "),
            classes: selectedClasses,
            xp: 0, cactoscoins: 0, level: 1, booksRead: 0, isActive: true,
            createdAt: new Date().toISOString()
          });
          toast("Conta criada com sucesso!", "success");
        } else {
          await auth.signInWithEmailAndPassword(email, pwd);
        }
      } catch(err) {
        const msgs = {
          "auth/invalid-credential": "E-mail ou senha inválidos.",
          "auth/email-already-in-use": "Este e-mail já está em uso."
        };
        toast(msgs[err.code] || "Erro ao autenticar.", "error");
        console.error(err);
      }
    }

    // --- INITIALIZATION ---
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        currentUser = null; currentProfile = null;
        renderAuth();
        return;
      }
      try {
        const snap = await db.collection("users").doc(user.uid).get();
        if (snap.exists) {
          currentUser = user;
          currentProfile = { uid: user.uid, ...snap.data() };
          await seedInitialData();
          renderApp();
        } else {
          renderAuth();
        }
      } catch(err) {
        console.error(err);
        renderAuth();
      }
    });

    $("#closeModalBtn").onclick = closeModal;
    $("#modal").onclick = (e) => {
      if (e.target === $("#modal")) closeModal();
    };
  </script>
</body>
</html>
